nexusDescription="[color=#93c47d][size=3][color=#ffffff][center][b][img=center]https://media.discordapp.net/attachments/954824443090337812/1030907182759284776/overview.png[/img][/b][/center][/color][/size][/color][size=3]\n<br />Shrine of Rededication adds a new shrine that allows the player to redistribute their attribute points at a cost. You'll need Dragon Souls to use the shrine and the cost increases as you level up. The shrine is located west of Fort Greymoor. I've included a video demonstrating the mod in action. \n<br />\xfeff\n<br />[color=#93c47d][b]\n<br />[/b][/color][center][color=#93c47d][b][color=#f4f4f4][img=center]https://media.discordapp.net/attachments/954824443090337812/1030907182146932766/installation.png[/img][/color][/b][/color][/center][/size][size=3]\n<br />Use a mod manager of your choice and install it as any other mod. For manual installation, copy the contents of the .zip file into the Data folder located at your Skyrim Special Edition installation folder.\n<br />\n<br />[b][color=#93c47d]\n<br />[/color][/b][center][b][color=#93c47d][color=#f4f4f4][img=center]https://media.discordapp.net/attachments/954824443090337812/1030907180855070842/require.png[/img][/color][/color][/b][b][/b][/center]\n<br />[url=https://www.nexusmods.com/skyrimspecialedition/mods/266/]Unofficial Skyrim Special Edition Patch[/url]\xfeff\n<br />\n<br />[b][color=#93c47d][b]\n<br />[/b][/color][center][color=#93c47d][b][/b][color=#f4f4f4][img=center]https://media.discordapp.net/attachments/954824443090337812/1030907181282889738/compat.png[/img][/color][/color][/center]\n<br />[/b][/size][list]\n<br />[*][size=3][b]\x2705[/b] Any race[b] [/b]overhaul that keeps the base vanilla attribute numbers.[/size]\n<br />[*][size=3]\x26a0\xfe0f Race overhauls that change the base vanilla attributes, like [url=https://www.nexusmods.com/skyrimspecialedition/mods/1315]Imperious - Races of Skyrim[/url]\xfeff, are not fully compatible. You can play with this, but the base values will be reverted to vanilla values and not the ones determined by the mod. I'll work on an update as soon as I can.\xa0[/size]\n<br />[/list][size=3][b][color=#93c47d][b]\n<br />\n<br />[/b][/color][center][color=#93c47d][color=#f4f4f4][img=center]https://media.discordapp.net/attachments/954824443090337812/1030907181685559346/credits.png[/img][/color][/color][/center]\n<br />[/b][/size][list]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/users/73698518]TDG [/url]\xfeff\x66or inspiration.[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/users/4672007]DarkFox127[/url]\xfeff for his videos.[/size]\n<br />[*][size=3][url=https://www.nexusmods.com/skyrimspecialedition/users/3165110?tab=about+me&amp;BH=1]johnskyrim[/url]\xfeff for his help.[/size]\n<br />[/list][size=3]\n<br />\n<br />[size=4][url=https://github.com/glimfeathers/shrine-of-rededication][b][center]Source[/center][/b][/url][/size][/size]"
